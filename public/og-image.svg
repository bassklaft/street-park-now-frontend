<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Simulated map grid in the background (right 60%): dark road-color lines -->
  <g stroke="#2c2c2c" stroke-width="2" stroke-linecap="round">
    <line x1="500"  y1="40"  x2="1160" y2="40"/>
    <line x1="500"  y1="90"  x2="1160" y2="90"/>
    <line x1="500"  y1="150" x2="1160" y2="150"/>
    <line x1="500"  y1="220" x2="1160" y2="220"/>
    <line x1="500"  y1="290" x2="1160" y2="290"/>
    <line x1="500"  y1="360" x2="1160" y2="360"/>
    <line x1="500"  y1="430" x2="1160" y2="430"/>
    <line x1="500"  y1="500" x2="1160" y2="500"/>
    <line x1="500"  y1="570" x2="1160" y2="570"/>
    <line x1="540"  y1="20"  x2="540"  y2="610"/>
    <line x1="610"  y1="20"  x2="610"  y2="610"/>
    <line x1="690"  y1="20"  x2="690"  y2="610"/>
    <line x1="770"  y1="20"  x2="770"  y2="610"/>
    <line x1="850"  y1="20"  x2="850"  y2="610"/>
    <line x1="930"  y1="20"  x2="930"  y2="610"/>
    <line x1="1010" y1="20"  x2="1010" y2="610"/>
    <line x1="1090" y1="20"  x2="1090" y2="610"/>
  </g>

  <!-- Colored "parking urgency" polylines on top -->
  <g stroke-width="7" stroke-linecap="round" opacity="0.95">
    <line x1="500"  y1="90"  x2="1160" y2="90"  stroke="#38A169"/>
    <line x1="610"  y1="20"  x2="610"  y2="610" stroke="#F7C948"/>
    <line x1="540"  y1="220" x2="1160" y2="220" stroke="#E53E3E"/>
    <line x1="770"  y1="20"  x2="770"  y2="610" stroke="#38A169"/>
    <line x1="850"  y1="290" x2="1090" y2="290" stroke="#E53E3E"/>
    <line x1="500"  y1="430" x2="1160" y2="430" stroke="#F7C948"/>
    <line x1="930"  y1="20"  x2="930"  y2="610" stroke="#E53E3E"/>
    <line x1="1010" y1="20"  x2="1010" y2="610" stroke="#38A169"/>
    <line x1="540"  y1="500" x2="1160" y2="500" stroke="#38A169"/>
  </g>

  <!-- Two illustrative map dots -->
  <circle cx="690" cy="290" r="9" fill="#3182CE" stroke="#fff" stroke-width="3"/>
  <circle cx="850" cy="430" r="4" fill="#E91E63" stroke="#000" stroke-width="0.5"/>
  <circle cx="1090" cy="220" r="4" fill="#7C3AED" stroke="#000" stroke-width="0.5"/>

  <!-- Soft fade between brand column and map column -->
  <rect x="420" y="0" width="120" height="630" fill="url(#fade)"/>
  <defs>
    <linearGradient id="fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#080808" stop-opacity="1"/>
      <stop offset="1" stop-color="#080808" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Logo: bold yellow P on rounded black squircle -->
  <g transform="translate(60, 150)">
    <rect width="280" height="280" rx="60" fill="#080808" stroke="#F7C948" stroke-width="3"/>
    <g transform="translate(140, 140) scale(0.25) translate(-512, -512)">
      <path fill="#F7C948" fill-rule="evenodd"
            d="M 352 162 L 352 862 L 492 862 L 492 522 A 180 180 0 0 0 492 162 Z M 492 282 A 80 80 0 0 0 492 402 Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="60" y="500"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="900" fill="#F7C948" letter-spacing="2">
    STREET PARK NOW
  </text>
  <text x="60" y="548"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="500" fill="#EDEBE4" letter-spacing="1">
    Know When To Park &amp; When To Move
  </text>
</svg>
